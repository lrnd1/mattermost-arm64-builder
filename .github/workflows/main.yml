name: Mattermost ARM64 Builder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest Mattermost version
        id: version
        run: |
          # Get the latest stable release from Mattermost GitHub
          LATEST_VERSION=$(curl -s https://api.github.com/repos/mattermost/mattermost/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          
          echo "Latest Mattermost version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Show version info
        run: |
          echo "✅ Detected version: ${{ steps.version.outputs.version }}"
          echo "This version will be used for the Docker image tag"
