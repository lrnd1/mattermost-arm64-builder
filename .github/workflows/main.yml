name: Mattermost ARM64 Builder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
      timezone: 'Europe/London'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest Mattermost version (clean, without v prefix)
        id: version
        run: |
          # Get tag from GitHub and remove leading 'v'
          RAW_VERSION=$(curl -s https://api.github.com/repos/mattermost/mattermost/releases/latest | grep '"tag_name":' | sed -E 's/.*"v?([^"]+)".*/\1/')
          echo "Clean version for download: $RAW_VERSION"
          echo "version=$RAW_VERSION" >> $GITHUB_OUTPUT

      - name: Check if this version already exists in registry
        id: image-exists
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/mattermost-team-arm64:$VERSION > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Version $VERSION already exists — skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (if new version available)
        if: steps.image-exists.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/mattermost-team-arm64:latest
            ghcr.io/${{ github.repository_owner }}/mattermost-team-arm64:${{ steps.version.outputs.version }}
          build-args: |
            MATTERMOST_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
